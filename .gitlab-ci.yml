default:
  image: node:20-bookworm
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  tags:
    - docker

stages:
  - build
  - test

build-job:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

lint-test-job: 
  stage: test
  script:
    - npm ci
    - npm run lint